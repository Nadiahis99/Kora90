<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول الإدارة - كورة90</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-body">

  <div class="admin-login-wrap">
    <div class="admin-login-card">

      <!-- Logo -->
      <div class="admin-login-logo">
        <img src="images/logo.png" alt="كورة90" />
        <h2>كورة90</h2>
        <p>لوحة تحكم الإدارة</p>
      </div>

      <h3 class="admin-login-title">تسجيل الدخول</h3>

      <!-- Error Message -->
      <div class="admin-error-msg" id="errorMsg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">اسم المستخدم أو كلمة المرور غير صحيحة</span>
      </div>

      <!-- Form -->
      <div>
        <!-- Username Field -->
        <div class="admin-form-group">
          <label for="username">اسم المستخدم</label>
          <div class="admin-input-icon">
            <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" />
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
          </div>
        </div>

        <!-- Password Field -->
        <div class="admin-form-group">
          <label for="password">كلمة المرور</label>
          <div class="admin-input-icon">
            <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" />
            <span class="input-icon" style="cursor:pointer;" onclick="togglePassword()">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>

        <!-- Remember Me -->
        <label class="admin-remember">
          <input type="checkbox" id="rememberMe" />
          تذكرني
        </label>

        <!-- Submit -->
        <button class="admin-btn-submit" id="submitBtn" onclick="handleLogin()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          دخول
        </button>
      </div>

      <p class="admin-back-link">
        <a href="index.html">← العودة للموقع الرئيسي</a>
      </p>

    </div>
  </div>

  <script>
    // Demo credentials: admin / admin123
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      // Clear previous errors
      errorMsg.classList.remove('show');
      document.getElementById('username').classList.remove('error');
      document.getElementById('password').classList.remove('error');

      // Basic validation
      if (!username || !password) {
        document.getElementById('errorText').textContent = 'يرجى تعبئة جميع الحقول';
        errorMsg.classList.add('show');
        if (!username) document.getElementById('username').classList.add('error');
        if (!password) document.getElementById('password').classList.add('error');
        return;
      }

      // Loading state
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        جاري التحقق...
      `;
      btn.disabled = true;

      setTimeout(() => {
        if (username === 'admin' && password === 'admin123') {
          // Success — redirect to dashboard
          window.location.href = 'admin-dashboard.html';
        } else {
          document.getElementById('errorText').textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
          errorMsg.classList.add('show');
          document.getElementById('username').classList.add('error');
          document.getElementById('password').classList.add('error');
          btn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            دخول
          `;
          btn.disabled = false;
        }
      }, 900);
    }

    // Toggle password visibility
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    }

    // Enter key submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    // Spin animation for loading
    const style = document.createElement('style');
    style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(style);
  </script>
</body>
</html>
